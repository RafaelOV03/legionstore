services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legionstore-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=debug
    volumes:
      - ./backend:/app
      - go_dir:/go
    networks:
      - legionstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legionstore-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - legionstore-network
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8080

networks:
  legionstore-network:
    driver: bridge

volumes:
  go_dir:
