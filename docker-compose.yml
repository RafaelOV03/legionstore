services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legionstore-backend
    ports:
      - "8080:8080"
    environment:
      # Gin Configuration
      - GIN_MODE=debug
      - PORT=8080
      
      # JWT Configuration
      - JWT_SECRET=dev-secret-key-legionstore-2026
      
      # PayPal Configuration (Sandbox)
      - PAYPAL_CLIENT_ID=sandbox-client-id
      - PAYPAL_SECRET=sandbox-secret
      - PAYPAL_BASE_URL=https://api-m.sandbox.paypal.com
      
      # Database Configuration
      - DB_PATH=./legionstore.db
      
      # CORS Configuration
      - CORS_ORIGINS=http://localhost:5173,http://localhost,http://frontend:5173
    volumes:
      - ./backend:/app
      - go_dir:/go
    networks:
      - legionstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legionstore-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - legionstore-network
    restart: unless-stopped

networks:
  legionstore-network:
    driver: bridge

volumes:
  go_dir:
