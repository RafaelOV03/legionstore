name: Go CI (Linter & Tests)

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          cd backend
          go mod tidy

      - name: Run Linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: backend

      - name: Run Unit Tests
        run: |
          cd backend
          go test -v ./...